<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WaCratch — 로그인 / 회원가입</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --wf:          #FFC947;
      --wf-dk:       #C88010;
      --wf-pale:     #FFF3C8;
      --orange:      #FF6B35;
      --orange-dk:   #D44E1A;
      --orange-lt:   #FF9A6C;
      --orange-pale: #FFE8DC;
      --teal:        #2EC4B6;
      --teal-dk:     #1A9E96;
      --teal-pale:   #D6F5F2;
      --yellow:      #FFD23F;
      --yellow-dk:   #D4A020;
      --pink:        #FF85A1;
      --pink-pale:   #FFE5EC;
      --cream:       #FFF8F2;
      --dark:        #2C1810;
      --mid:         #7B6B63;
      --border:      #F0E0D6;
      --r-sm: 12px;
      --r-md: 20px;
      --r-lg: 28px;
      --font-d: 'Baloo 2', cursive;
      --font-b: 'Nunito', sans-serif;
    }

    body {
      font-family: var(--font-b);
      min-height: 100vh;
      display: flex; align-items: stretch;
      overflow: hidden;
    }

    /* ══════════════════ LEFT PANEL ══════════════════ */
    .left {
      width: 52%;
      background: linear-gradient(145deg, #E8A818 0%, #FFC947 55%, #FFE090 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 56px; position: relative; overflow: hidden;
    }

    /* wavy bottom clip */
    .left::after {
      content: '';
      position: absolute; top: 0; right: -48px; bottom: 0;
      width: 96px;
      background: var(--cream);
      clip-path: ellipse(48px 60% at 100% 50%);
      z-index: 1;
    }

    /* dot pattern overlay */
    .left::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,.25) 1.5px, transparent 1.5px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    .left-inner { position: relative; z-index: 0; text-align: center; }

    /* animated floating paws */
    .paw-float {
      position: absolute; font-size: 28px; opacity: .22; pointer-events: none;
      animation: floatRnd 4s ease-in-out infinite;
    }
    .pf1 { top: 8%;  left: 12%; animation-delay: 0s;   animation-duration: 3.6s; font-size: 32px; }
    .pf2 { top: 18%; right: 8%; animation-delay: 1s;   animation-duration: 4.2s; }
    .pf3 { bottom: 22%; left: 6%;  animation-delay: 0.5s; animation-duration: 3s;   font-size: 22px; }
    .pf4 { bottom: 10%; right: 14%; animation-delay: 1.8s; animation-duration: 4.8s; font-size: 24px; }
    .pf5 { top: 44%; left: 4%;  animation-delay: 0.8s; animation-duration: 3.4s; font-size: 20px; }

    @keyframes floatRnd {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-14px) rotate(5deg); }
    }

    /* mascot */
    .mascot-wrap {
      width: 240px; height: 240px; margin: 0 auto 28px;
      animation: mascotBob 3.5s ease-in-out infinite;
    }
    @keyframes mascotBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50%      { transform: translateY(-16px) rotate(3deg); }
    }

    .left-title {
      font-family: var(--font-d); font-size: 40px; font-weight: 800;
      color: var(--dark); margin-bottom: 12px; letter-spacing: -.5px;
    }
    .left-sub {
      font-size: 17px; color: rgba(44,24,16,.72); font-weight: 600;
      line-height: 1.65; margin-bottom: 32px;
    }

    .left-tags { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .left-tag {
      background: rgba(255,255,255,.5); border: 2px solid rgba(200,128,16,.35);
      color: var(--dark); font-weight: 800; font-size: 13px;
      padding: 7px 16px; border-radius: 100px;
    }

    /* ══════════════════ RIGHT PANEL ══════════════════ */
    .right {
      flex: 1;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 56px 60px 80px; position: relative;
    }

    /* dot bg */
    .right::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, #FF6B35 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: .04; pointer-events: none;
    }

    .form-card {
      width: 100%; max-width: 420px;
      position: relative; z-index: 1;
    }

    /* ── back link ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--mid); font-weight: 700; font-size: 14px;
      text-decoration: none; margin-bottom: 32px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--orange); }

    /* ── tabs ── */
    .tabs {
      display: flex; gap: 6px;
      background: var(--border); padding: 5px;
      border-radius: var(--r-md); margin-bottom: 36px;
    }
    .tab {
      flex: 1; font-family: var(--font-b); font-weight: 800; font-size: 15px;
      padding: 11px; border-radius: var(--r-sm); border: none; cursor: pointer;
      background: transparent; color: var(--mid); transition: all .2s;
    }
    .tab.active {
      background: #fff; color: var(--orange);
      box-shadow: 2px 3px 0 var(--orange-pale);
    }
    .tab:not(.active):hover { color: var(--orange); }

    /* ── form heading ── */
    .form-title {
      font-family: var(--font-d); font-size: 30px; font-weight: 800;
      margin-bottom: 8px; color: var(--dark);
    }
    .form-sub { font-size: 14px; color: var(--mid); font-weight: 600; margin-bottom: 28px; }

    /* ── fields ── */
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-weight: 800; font-size: 13px; color: var(--dark);
      margin-bottom: 7px;
    }
    .field-wrap {
      position: relative;
    }
    .field-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      font-size: 17px; pointer-events: none;
    }
    .field input {
      width: 100%; font-family: var(--font-b); font-weight: 600; font-size: 15px;
      padding: 13px 16px 13px 46px;
      border: 2.5px solid var(--border); border-radius: var(--r-md);
      background: #fff; color: var(--dark); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field input::placeholder { color: var(--mid); opacity: .7; }
    .field input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 4px var(--orange-pale);
    }

    /* ── checkbox ── */
    .remember-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .remember-left { display: flex; align-items: center; gap: 8px; }
    .remember-left input[type=checkbox] {
      width: 18px; height: 18px; accent-color: var(--orange); cursor: pointer;
    }
    .remember-left label { font-size: 13px; font-weight: 700; color: var(--mid); cursor: pointer; }
    .forgot { font-size: 13px; font-weight: 700; color: var(--orange); text-decoration: none; }
    .forgot:hover { text-decoration: underline; }

    /* ── submit ── */
    .btn-submit {
      width: 100%; font-family: var(--font-b); font-weight: 800; font-size: 17px;
      padding: 15px; border-radius: var(--r-md); border: none; cursor: pointer;
      background: var(--wf); color: var(--dark);
      box-shadow: 3px 5px 0 var(--wf-dk);
      transition: all .15s; margin-bottom: 20px;
    }
    .btn-submit:hover  { transform: translateY(-2px); box-shadow: 3px 7px 0 var(--wf-dk); }
    .btn-submit:active { transform: translateY(1px);  box-shadow: 2px 2px 0 var(--wf-dk); }

    /* ── divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 2px; background: var(--border); border-radius: 1px;
    }
    .divider span { font-size: 12px; font-weight: 700; color: var(--light-mid, #B0A8A4); white-space: nowrap; }

    /* ── social buttons ── */
    .socials { display: flex; gap: 12px; margin-bottom: 24px; }
    .btn-social {
      flex: 1; font-family: var(--font-b); font-weight: 700; font-size: 14px;
      padding: 12px 8px; border-radius: var(--r-md); border: 2.5px solid var(--border);
      background: #fff; color: var(--dark); cursor: pointer; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 7px;
    }
    .btn-social:hover { border-color: var(--orange); background: var(--orange-pale); }

    /* ── switch link ── */
    .switch-hint {
      text-align: center; font-size: 14px; color: var(--mid); font-weight: 600;
    }
    .switch-hint a { color: var(--orange); font-weight: 800; text-decoration: none; }
    .switch-hint a:hover { text-decoration: underline; }

    /* ── signup extra fields ── */
    .signup-extra { display: none; }
    .signup-extra.show { display: block; }

    /* ── age chips ── */
    .age-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .age-chip {
      font-family: var(--font-b); font-weight: 800; font-size: 13px;
      padding: 8px 16px; border-radius: 100px;
      border: 2.5px solid var(--border); background: #fff;
      color: var(--mid); cursor: pointer; transition: all .2s;
    }
    .age-chip.selected,
    .age-chip:hover {
      border-color: var(--teal); background: var(--teal-pale); color: var(--teal-dk);
    }

    /* ── password strength ── */
    .pw-strength { margin-top: 8px; display: flex; gap: 5px; align-items: center; }
    .pw-bar { flex: 1; height: 5px; border-radius: 3px; background: var(--border); }
    .pw-bar.fill-1 { background: #FF6B6B; }
    .pw-bar.fill-2 { background: var(--yellow); }
    .pw-bar.fill-3 { background: var(--teal); }
    .pw-label { font-size: 11px; font-weight: 700; color: var(--mid); }

    /* ── welcome badge ── */
    .welcome-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--yellow); color: var(--dark);
      font-weight: 800; font-size: 13px;
      padding: 5px 13px; border-radius: 100px;
      box-shadow: 2px 3px 0 var(--yellow-dk);
      margin-bottom: 20px;
      animation: pop-in .5s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pop-in {
      0%   { opacity: 0; transform: scale(.6); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<!-- ── LEFT PANEL ── -->
<div class="left">
  <span class="paw-float pf1">🧇</span>
  <span class="paw-float pf2">⭐</span>
  <span class="paw-float pf3">✨</span>
  <span class="paw-float pf4">🧇</span>
  <span class="paw-float pf5">💫</span>

  <div class="left-inner">
    <!-- 와피냥 mascot -->
    <div class="mascot-wrap">
      <svg viewBox="-18 -18 306 378" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:240px;height:296px;">
        <ellipse cx="130" cy="192" r="140" fill="rgba(255,255,255,.22)" opacity=".6"/>
        <!-- TAIL -->
        <path d="M198 258 Q248 228 244 186 Q240 152 222 163" stroke="#C88010" stroke-width="26" fill="none" stroke-linecap="round"/>
        <path d="M198 258 Q248 228 244 186 Q240 152 222 163" stroke="#E8A818" stroke-width="16" fill="none" stroke-linecap="round"/>
        <circle cx="222" cy="161" r="20" fill="rgba(255,255,255,.6)"/>
        <!-- LEFT ARM -->
        <ellipse cx="22" cy="222" rx="22" ry="28" fill="#C88010" transform="rotate(-12 22 222)"/>
        <ellipse cx="22" cy="222" rx="16" ry="21" fill="#E8A818" transform="rotate(-12 22 222)"/>
        <circle cx="16" cy="246" r="14" fill="#C88010"/>
        <circle cx="16" cy="246" r="10" fill="#E8A818"/>
        <!-- RIGHT ARM waving -->
        <path d="M236 174 Q256 135 250 108 Q247 90 236 98" stroke="#C88010" stroke-width="26" fill="none" stroke-linecap="round"/>
        <path d="M236 174 Q256 135 250 108 Q247 90 236 98" stroke="#E8A818" stroke-width="16" fill="none" stroke-linecap="round"/>
        <circle cx="238" cy="98" r="18" fill="#C88010"/>
        <circle cx="238" cy="98" r="13" fill="#E8A818"/>
        <!-- WAFFLE BODY -->
        <rect x="16" y="60" width="228" height="224" rx="68" fill="#E8A818"/>
        <line x1="16" y1="130" x2="244" y2="130" stroke="#A86C00" stroke-width="12" stroke-linecap="round" opacity=".5"/>
        <line x1="16" y1="200" x2="244" y2="200" stroke="#A86C00" stroke-width="12" stroke-linecap="round" opacity=".5"/>
        <line x1="88"  y1="60"  x2="88"  y2="284" stroke="#A86C00" stroke-width="12" stroke-linecap="round" opacity=".5"/>
        <line x1="172" y1="60"  x2="172" y2="284" stroke="#A86C00" stroke-width="12" stroke-linecap="round" opacity=".5"/>
        <rect x="26"  y="70"  width="53" height="51" rx="14" fill="rgba(255,255,255,.22)"/>
        <rect x="97"  y="70"  width="66" height="51" rx="14" fill="rgba(255,255,255,.22)"/>
        <rect x="181" y="70"  width="53" height="51" rx="14" fill="rgba(255,255,255,.22)"/>
        <rect x="26"  y="140" width="53" height="51" rx="14" fill="rgba(255,255,255,.16)"/>
        <rect x="97"  y="140" width="66" height="51" rx="14" fill="rgba(255,255,255,.16)"/>
        <rect x="181" y="140" width="53" height="51" rx="14" fill="rgba(255,255,255,.16)"/>
        <ellipse cx="130" cy="88" rx="72" ry="18" fill="rgba(255,255,255,.18)"/>
        <!-- EARS -->
        <path d="M52,78 C36,52 30,16 64,8 C86,3 108,50 104,68 Z" fill="#C88010"/>
        <path d="M60,74 C48,54 44,30 64,20 C78,14 98,52 96,68 Z" fill="rgba(255,255,255,.35)" opacity=".9"/>
        <path d="M208,78 C224,52 230,16 196,8 C174,3 152,50 156,68 Z" fill="#C88010"/>
        <path d="M200,74 C212,54 216,30 196,20 C182,14 162,52 164,68 Z" fill="rgba(255,255,255,.35)" opacity=".9"/>
        <!-- EYES C형 -->
        <circle cx="90"  cy="156" r="11" fill="#1A0A00"/>
        <circle cx="90"  cy="156" r="8.5" fill="#2C1208"/>
        <circle cx="170" cy="156" r="11" fill="#1A0A00"/>
        <circle cx="170" cy="156" r="8.5" fill="#2C1208"/>
        <!-- NOSE -->
        <circle cx="130" cy="182" r="9" fill="#8B4A00"/>
        <!-- MOUTH ω -->
        <path d="M117 194 Q124 202 130 194 Q136 202 143 194" stroke="#1A0A00" stroke-width="2.8" fill="none" stroke-linecap="round"/>
        <!-- WHISKERS -->
        <line x1="104" y1="182" x2="58"  y2="173" stroke="#1A0A00" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <line x1="104" y1="190" x2="56"  y2="190" stroke="#1A0A00" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <line x1="156" y1="182" x2="202" y2="173" stroke="#1A0A00" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <line x1="156" y1="190" x2="204" y2="190" stroke="#1A0A00" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
        <!-- FEET -->
        <ellipse cx="90"  cy="302" rx="40" ry="23" fill="#C88010"/>
        <ellipse cx="90"  cy="297" rx="34" ry="19" fill="#E8A818"/>
        <ellipse cx="170" cy="302" rx="40" ry="23" fill="#C88010"/>
        <ellipse cx="170" cy="297" rx="34" ry="19" fill="#E8A818"/>
      </svg>
    </div>

    <h2 class="left-title">와피냥과 함께<br>코딩해요! 🧇</h2>
    <p class="left-sub">
      블록을 조립하면<br>
      나만의 게임이 완성돼요!
    </p>

  </div>
</div>

<!-- ── RIGHT PANEL ── -->
<div class="right">
  <div class="form-card">
    <a href="index.html" class="back-link">← 홈으로 돌아가기</a>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">🔑 로그인</button>
      <button class="tab"        onclick="switchTab('signup', this)">🐣 회원가입</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="form-login">
      <h2 class="form-title">다시 만났어요! 😺</h2>
      <p class="form-sub">아이디와 비밀번호를 입력해 주세요.</p>

      <form onsubmit="return false;">
        <div class="field">
          <label for="l-id">아이디</label>
          <div class="field-wrap">
            <span class="field-icon">🐾</span>
            <input type="text" id="l-id" placeholder="아이디를 입력하세요">
          </div>
        </div>
        <div class="field">
          <label for="l-pw">비밀번호</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="l-pw" placeholder="비밀번호를 입력하세요">
          </div>
        </div>

        <div class="remember-row">
          <div class="remember-left">
            <input type="checkbox" id="remember">
            <label for="remember">로그인 상태 유지</label>
          </div>
          <a href="#" class="forgot">비밀번호 찾기</a>
        </div>

        <button type="submit" class="btn-submit" onclick="location.href='dashboard.html';return false;">로그인하기 →</button>
      </form>

      <p class="switch-hint">
        아직 계정이 없나요? <a onclick="switchTab('signup', document.querySelectorAll('.tab')[1]); return false;" href="#">회원가입하기</a>
      </p>
    </div>

    <!-- SIGNUP FORM -->
    <div id="form-signup" style="display:none;">
      <h2 class="form-title">와피냥 친구 되기! 🧇</h2>
      <p class="form-sub">정보를 입력하고 코딩 세계로 입장해요!</p>

      <form onsubmit="return false;">
        <div class="field">
          <label for="s-nickname">닉네임</label>
          <div class="field-wrap">
            <span class="field-icon">🐾</span>
            <input type="text" id="s-nickname" placeholder="사용할 닉네임 (예: 코딩냥이)">
          </div>
        </div>
        <div class="field">
          <label for="s-id">아이디</label>
          <div class="field-wrap">
            <span class="field-icon">😺</span>
            <input type="text" id="s-id" placeholder="영문, 숫자 조합 (4~16자)">
          </div>
        </div>
        <div class="field">
          <label for="s-pw">비밀번호</label>
          <div class="field-wrap">
            <span class="field-icon">🔒</span>
            <input type="password" id="s-pw" placeholder="8자 이상 입력해 주세요" oninput="checkPw(this.value)">
          </div>
          <div class="pw-strength" id="pw-strength" style="display:none;">
            <div class="pw-bar" id="pb1"></div>
            <div class="pw-bar" id="pb2"></div>
            <div class="pw-bar" id="pb3"></div>
            <span class="pw-label" id="pw-label">약함</span>
          </div>
        </div>
        <button type="submit" class="btn-submit" style="background:var(--teal);box-shadow:3px 5px 0 var(--teal-dk);margin-top:8px;color:#fff;" onclick="location.href='dashboard.html';return false;">가입하기 🧇</button>
      </form>

      <p class="switch-hint" style="margin-top:8px;">
        이미 계정이 있나요? <a onclick="switchTab('login', document.querySelectorAll('.tab')[0]); return false;" href="#">로그인하기</a>
      </p>
    </div>
  </div>
</div>

<script>
  function switchTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('form-login').style.display  = tab === 'login'  ? '' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? '' : 'none';
  }

  function selectAge(el) {
    document.querySelectorAll('.age-chip').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
  }

  function checkPw(val) {
    const el = document.getElementById('pw-strength');
    el.style.display = val.length ? 'flex' : 'none';
    const bars   = [document.getElementById('pb1'), document.getElementById('pb2'), document.getElementById('pb3')];
    const label  = document.getElementById('pw-label');
    bars.forEach(b => { b.className = 'pw-bar'; });
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val) || /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const labels = ['', '약함', '보통', '강함'];
    const fills  = ['', 'fill-1', 'fill-2', 'fill-3'];
    for (let i = 0; i < score; i++) bars[i].classList.add(fills[score]);
    label.textContent = labels[score] || '약함';
  }
</script>
</body>
</html>
