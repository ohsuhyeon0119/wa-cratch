services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catcratch
      POSTGRES_PASSWORD: catcratch
      POSTGRES_DB: catcratch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://catcratch:catcratch@db:5432/catcratch
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
