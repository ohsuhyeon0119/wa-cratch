name: CI

on:
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run Playwright tests
        working-directory: frontend
        run: npx playwright test

  backend:
    name: Hurl API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: catcratch
          POSTGRES_PASSWORD: catcratch
          POSTGRES_DB: catcratch
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start FastAPI server
        working-directory: backend
        env:
          DATABASE_URL: postgresql://catcratch:catcratch@localhost:5432/catcratch
        run: uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      - name: Wait for server
        run: sleep 3
      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/latest/download/hurl_x86_64_linux.tar.gz
          tar -xzf hurl_x86_64_linux.tar.gz
          sudo mv hurl /usr/local/bin/
      - name: Run Hurl tests
        run: hurl --test backend/tests/hurl/*.hurl --variable base_url=http://localhost:8000
